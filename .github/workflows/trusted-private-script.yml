name: Trusted Private Script

run-name: ${{ inputs.request_id }}

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Bare private repository name under M-Adoo"
        required: true
        type: string
      ref:
        description: "40-character commit SHA to check out"
        required: true
        type: string
      script:
        description: "Repository-relative trusted script path"
        required: true
        type: string
      matrix:
        description: "JSON array of matrix objects"
        required: true
        type: string
      input:
        description: "JSON payload for the trusted script"
        required: true
        type: string
      request_id:
        description: "Caller-generated run identifier"
        required: true
        type: string

permissions: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.validate.outputs.matrix }}
    steps:
      - id: validate
        name: Validate dispatch request
        env:
          GH_TOKEN: ${{ secrets.ADOO_PRIVATE_REPO_PAT }}
          INPUT_REPO: ${{ inputs.repo }}
          INPUT_REF: ${{ inputs.ref }}
          INPUT_SCRIPT: ${{ inputs.script }}
          INPUT_MATRIX: ${{ inputs.matrix }}
          INPUT_PAYLOAD: ${{ inputs.input }}
          INPUT_REQUEST_ID: ${{ inputs.request_id }}
        shell: bash
        run: |
          set -euo pipefail

          fail() {
            echo "::error::$*"
            exit 1
          }

          [[ -n "${GH_TOKEN:-}" ]] || fail "ADOO_PRIVATE_REPO_PAT secret is required"
          [[ "$INPUT_REPO" =~ ^[A-Za-z0-9_.-]+$ ]] || fail "repo must be a bare repository name"
          [[ "$INPUT_REF" =~ ^[0-9a-fA-F]{40}$ ]] || fail "ref must be a 40-character commit SHA"
          [[ "$INPUT_REQUEST_ID" =~ ^[A-Za-z0-9_.:-]+$ ]] || fail "request_id contains unsupported characters"

          case "$INPUT_SCRIPT" in
            ""|/*) fail "script must be a non-empty relative path" ;;
          esac
          IFS='/' read -r -a script_parts <<<"$INPUT_SCRIPT"
          for part in "${script_parts[@]}"; do
            [[ -n "$part" ]] || fail "script path must not contain empty segments"
            [[ "$part" != "." ]] || fail "script path must not contain '.' segments"
            [[ "$part" != ".." ]] || fail "script path must not contain '..' segments"
          done

          full_repo="M-Adoo/${INPUT_REPO}"
          is_private="$(gh repo view "$full_repo" --json isPrivate --jq .isPrivate)"
          [[ "$is_private" == "true" ]] || fail "$full_repo must be private"

          matrix="$(jq -ce '
            if type != "array" or length == 0 then
              error("matrix must be a non-empty JSON array")
            elif any(.[]; type != "object") then
              error("matrix entries must be objects")
            else
              .
            end
          ' <<<"$INPUT_MATRIX")" || fail "matrix must be valid JSON"

          jq -e . >/dev/null <<<"$INPUT_PAYLOAD" || fail "input must be valid JSON"

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  run:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.validate.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout private repository
        uses: actions/checkout@v4
        with:
          repository: M-Adoo/${{ inputs.repo }}
          ref: ${{ inputs.ref }}
          token: ${{ secrets.ADOO_PRIVATE_REPO_PAT }}
          persist-credentials: false
          fetch-depth: 1

      - name: Validate trusted script file
        env:
          INPUT_SCRIPT: ${{ inputs.script }}
        shell: bash
        run: |
          set -euo pipefail

          fail() {
            echo "::error::$*"
            exit 1
          }

          [[ -f "$INPUT_SCRIPT" ]] || fail "trusted script is not a regular file"
          [[ ! -L "$INPUT_SCRIPT" ]] || fail "trusted script must not be a symlink"

      - name: Write script input
        env:
          INPUT_PAYLOAD: ${{ inputs.input }}
        shell: bash
        run: |
          set -euo pipefail

          input_file="$RUNNER_TEMP/adoo-runner-input.json"
          printf '%s' "$INPUT_PAYLOAD" > "$input_file"
          jq -e . "$input_file" >/dev/null
          echo "ADOO_RUNNER_INPUT=$input_file" >> "$GITHUB_ENV"

      - name: Execute trusted script
        env:
          GH_TOKEN: ${{ secrets.ADOO_PRIVATE_REPO_PAT }}
          ADOO_RUNNER_MATRIX: ${{ toJson(matrix) }}
          ADOO_RUNNER_REQUEST_ID: ${{ inputs.request_id }}
          INPUT_SCRIPT: ${{ inputs.script }}
        shell: bash
        run: |
          set -euo pipefail

          log_dir="$RUNNER_TEMP/adoo-runner-logs"
          mkdir -p "$log_dir"
          bash "$INPUT_SCRIPT" >"$log_dir/stdout.log" 2>"$log_dir/stderr.log"

      - name: Cleanup private workspace and logs
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          workspace="$GITHUB_WORKSPACE"
          cd "$RUNNER_TEMP"
          rm -rf "$workspace" \
            "$RUNNER_TEMP/adoo-runner-logs" \
            "$RUNNER_TEMP/adoo-runner-input.json"
